name: Build Android App

on:
  push:
    branches:
      - 'master'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create Release Keystore
        env:
          KEYSTORE_FILE_BASE64: ${{ secrets.KEYSTORE_FILE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_FILE_BASE64" ]; then
            echo "$KEYSTORE_FILE_BASE64" | base64 --decode > release-key.jks
            echo "KEYSTORE_CREATED=true" >> $GITHUB_ENV
          else
            echo "No keystore found, building unsigned release"
            echo "KEYSTORE_CREATED=false" >> $GITHUB_ENV
          fi

      - name: Create keystore.properties
        env:
          KEYSTORE_CREATED: ${{ env.KEYSTORE_CREATED }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ "$KEYSTORE_CREATED" = "true" ]; then
            cat > keystore.properties << EOF
          storeFile=release-key.jks
          storePassword=$STORE_PASSWORD
          keyAlias=$KEY_ALIAS
          keyPassword=$KEY_PASSWORD
          EOF
          else
            echo "Skipping keystore.properties creation"
          fi

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      - name: Get version name and timestamp
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle.kts | awk -F'"' '{print $2}')
          TIMESTAMP=$(date +'%Y%m%d-%H%M%S')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "Timestamp: $TIMESTAMP"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.timestamp }}
          name: Clash Proxy Select v${{ steps.version.outputs.version }}-${{ steps.version.outputs.timestamp }}
          body: |
            ## 🎉 Clash Proxy Select v${{ steps.version.outputs.version }}

            ### 📦 下载说明
            - **APK**: 直接安装到 Android 设备

            ### ✨ 功能特性
            - 支持多后端管理
            - 实时节点选择
            - 代理状态监控
            - Material Design 3 界面

            ### 📱 安装方式
            1. 下载 APK 文件
            2. 在 Android 设备上启用"未知来源"安装
            3. 直接安装 APK

            ---
            🤖 自动构建于 ${{ steps.version.outputs.timestamp }}
          files: |
            app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Summary
        run: |
          echo "## 🎉 Android Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Build Artifacts:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Release APK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Release Information:" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: v${{ steps.version.outputs.version }}-${{ steps.version.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: ${{ steps.version.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download from Releases page!" >> $GITHUB_STEP_SUMMARY